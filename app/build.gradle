plugins {
    id 'com.android.application'
}

android {
    namespace 'com.amadeus.dandanxiuqiu'
    compileSdk 36

    defaultConfig {
        applicationId 'com.amadeus.dandanxiuqiu'
        minSdk 23
        targetSdk 36
        versionCode 1
        versionName '1.0.0'

        testInstrumentationRunner 'android.app.InstrumentationTestRunner'
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    testImplementation 'junit:junit:4.13.2'
}
